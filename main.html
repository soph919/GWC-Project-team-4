<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');
        body {
        font-family: 'Pixelify Sans', sans-serif;
        font-weight: 100; /* thinner */
        background-color: #121052;
        background: linear-gradient(180deg,rgba(18, 16, 82, 1) 0%, rgba(207, 95, 207, 1) 100%);
        background-repeat: no-repeat;
        color:white;
        text-align: center;
        height:800px;
        }

        h1 {
            margin-top: 150px;
            font-size: 64px;
            color: #F2D482;
            text-shadow: 2px 4px 0 #080726e7;
        }

        p {
            max-width:650px;
           margin:auto;
        }
        ul{
            margin-top:300px;
            display: flex;
            justify-content: center;
            gap: 10px;
            list-style: none;
            padding: 0;
        }

        li {
            padding:9px;
            margin:30px;
            max-width: max-content;
            background-color: #B3ACFA;
            color:#121052;
            border-radius: 5px;
            box-shadow: 0 4px 0 #121052c2;
        }

        li:hover {
                box-shadow: 0 2px 0 #121052c2;
                transform: translateY(2px);
                background-color: #9893d6;
        }

        a {
            text-decoration: none;
            color:#121052;
        }

    </style>
</head>
